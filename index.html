<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMPTY GODS</title>

<style>

html, body{
margin:0;
height:100%;
font-family: Garamond, "Adobe Garamond Pro", "Times New Roman", serif;
color:white;
overflow:hidden;
}

/* background image */

body{
background-image:url("main.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
transition:background-image 0.25s ease;
}

/* tonal hover version */

body.hover-bg{
background-image:url("main_alt.jpg");
}

/* title block */

.title{
position:fixed;
top:40px;
right:40px;
text-align:right;
}

/* EMPTY GODS */

.title h1{
margin:0;
font-size:1.8rem;
letter-spacing:0.28em;
font-weight:400;
opacity:0.9;
}

/* GRACE */

.title h2{
margin-top:6px;
font-size:3.4rem;
letter-spacing:0.18em;
font-weight:500;
}

/* navigation */

.nav{
position:fixed;
top:50%;
left:40px;
transform:translateY(-50%);
}

.nav a{
display:block;
color:white;
text-decoration:none;
font-size:1.9rem;
margin:24px 0;
letter-spacing:0.2em;
font-weight:400;
transition:opacity 0.25s ease;
}

.nav a:hover{
opacity:0.6;
}

/* mobile layout */

@media (max-width:600px){

.title{
top:30px;
right:25px;
}

.title h1{
font-size:1.3rem;
}

.title h2{
font-size:2.2rem;
}

.nav{
left:25px;
}

.nav a{
font-size:1.5rem;
}

}

</style>

</head>

<body>

<div class="title">

<h1>EMPTY GODS</h1>
<h2>GRACE</h2>

</div>

<div class="nav">

<a href="listen.html"
onmouseenter="hoverOn()"
onmouseleave="hoverOff()"
ontouchstart="hoverOn()">LISTEN</a>

<a href="contact.html"
onmouseenter="hoverOn()"
onmouseleave="hoverOff()"
ontouchstart="hoverOn()">CONTACT</a>

</div>

<script>

/* hover + touch tonal shift */

function hoverOn(){
document.body.classList.add("hover-bg")
}

function hoverOff(){
document.body.classList.remove("hover-bg")
}


/* desktop parallax */

document.addEventListener("mousemove", function(e){

const x = (e.clientX / window.innerWidth - 0.5) * 12
const y = (e.clientY / window.innerHeight - 0.5) * 12

document.body.style.backgroundPosition =
`calc(50% + ${x}px) calc(50% + ${y}px)`

})


/* subtle mobile movement */

window.addEventListener("scroll", function(){

const offset = window.pageYOffset * 0.12

document.body.style.backgroundPosition =
`center calc(50% + ${offset}px)`

})

</script>

</body>

</html>
